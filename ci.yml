Global:
    tool : build_submitter
Default:
    profile : [publish]
Profiles:
    - profile:
      name : dev
      env: DECK_CENTOS7U5_K3
      command : bash build.sh
      release : false
    - profile:
      name :  publish
      env: DECK_CENTOS7U5_K3
      command : bash build.sh
      release : true
